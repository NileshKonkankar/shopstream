version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: shopstream_db
    ports:
      - "27017:27017"
    volumes:
      - shopstream_db_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopstream_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/shopstream
      - JWT_SECRET=super_secret_jwt_key_shopstream_portfolioproject
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost
      - STRIPE_SECRET_KEY=sk_test_51MockKeyShopStreamSecretKey00000000000
      - STRIPE_WEBHOOK_SECRET=whsec_MockWebhookSecretKeyShopStream000000000
      - CURRENCY=INR
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: shopstream_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  shopstream_db_data:
